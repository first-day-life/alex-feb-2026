<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Landing Pages · Quick View</title>
  <style>
    :root{
      --bg:#0f1117; --panel:#171a23; --panel2:#1e222e; --line:#2a2f3d;
      --text:#e7eaf0; --text2:#9aa2b4; --accent:#6d8bff; --accent2:#3ad29f;
      --shadow:0 1px 3px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.25);
    }
    *{box-sizing:border-box}
    body{
      margin:0; background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
      -webkit-font-smoothing:antialiased;
    }
    .wrap{max-width:980px;margin:0 auto;padding:32px 20px 64px}
    header.top{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:8px}
    h1{font-size:24px;font-weight:800;margin:0;letter-spacing:-.02em}
    .sub{color:var(--text2);font-size:13px;margin:6px 0 0}
    .controls{display:flex;gap:8px;align-items:center}
    .controls label{font-size:12px;color:var(--text2)}
    select{
      background:var(--panel2);color:var(--text);border:1px solid var(--line);
      border-radius:8px;padding:7px 10px;font-size:13px;cursor:pointer;
    }
    .totals{display:flex;flex-wrap:wrap;gap:12px;margin:22px 0 18px}
    .stat{
      background:var(--panel);border:1px solid var(--line);border-radius:12px;
      padding:14px 18px;flex:1;min-width:140px;
    }
    .stat .v{font-size:22px;font-weight:700;letter-spacing:-.02em}
    .stat .l{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-top:4px}
    ul.list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
    li.row{
      display:grid;grid-template-columns:34px 1fr auto;align-items:center;gap:14px;
      background:var(--panel);border:1px solid var(--line);border-radius:12px;
      padding:12px 16px;text-decoration:none;color:inherit;transition:.12s ease;
    }
    li.row:hover{border-color:var(--accent);background:var(--panel2);transform:translateY(-1px);box-shadow:var(--shadow)}
    .rank{font-size:13px;font-weight:700;color:var(--text2);text-align:center}
    .pmeta{min-width:0}
    .pname{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ppath{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
    .metrics{display:flex;gap:22px;text-align:right}
    .metric .mv{font-size:16px;font-weight:700;letter-spacing:-.01em}
    .metric .ml{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
    .metric .mv.orders{color:var(--accent2)}
    .state{text-align:center;color:var(--text2);padding:60px 20px;font-size:14px}
    .ext{font-size:11px;color:var(--text2);margin-top:2px}
    a.row .pname::after{content:" ↗";color:var(--accent);font-weight:600;opacity:0;transition:.12s}
    a.row:hover .pname::after{opacity:1}
    @media(max-width:560px){
      .metrics{gap:14px}
      li.row{grid-template-columns:26px 1fr auto;gap:10px;padding:11px 13px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div>
        <h1>Top Landing Pages</h1>
        <p class="sub" id="subtitle">Loading last 30 days…</p>
      </div>
      <div class="controls">
        <label for="sortBy">Sort by</label>
        <select id="sortBy">
          <option value="sessions">Avg sessions/day</option>
          <option value="orders">Avg orders/day</option>
          <option value="cvr">Conversion rate</option>
        </select>
        <label for="topN">Show</label>
        <select id="topN">
          <option value="10">Top 10</option>
          <option value="25" selected>Top 25</option>
          <option value="50">Top 50</option>
          <option value="9999">All</option>
        </select>
      </div>
    </header>

    <div class="totals" id="totals"></div>
    <ul class="list" id="list"><li class="state">Loading…</li></ul>
  </div>

  <script>
    const SHEET_URL =
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vRCpN6f4J91aFKu9PFdPyqkWxc_q96mYif3JyCY9zI2C4VmoNHULLTvpa-XDOS_fkV9cIn2_0RfYZ_E/pub?gid=1777172587&single=true&output=csv";
    const BASE_URL = "https://firstday.com";
    const WINDOW_DAYS = 30;

    const fmt = (n) => Math.round(n).toLocaleString("en-US");
    const fmt1 = (n) => (Math.round(n * 10) / 10).toLocaleString("en-US", {minimumFractionDigits:1, maximumFractionDigits:1});
    const pct = (n) => (n * 100).toFixed(2) + "%";

    function parseLine(line){
      const out=[]; let cur=""; let q=false;
      for(let i=0;i<line.length;i++){
        const c=line[i];
        if(q){ if(c==='"'&&line[i+1]==='"'){cur+='"';i++;} else if(c==='"'){q=false;} else cur+=c; }
        else{ if(c==='"')q=true; else if(c===','){out.push(cur.trim());cur="";} else cur+=c; }
      }
      out.push(cur.trim());
      return out;
    }
    const num = (s) => { const v=parseFloat(String(s||"").replace(/[%$,]/g,"")); return isNaN(v)?0:v; };
    const normPath = (p) => !p ? "/" : (p[0]==="/" ? p : "/"+p);

    let state = { pages: [], dayCount: 0, start: "", end: "" };

    async function load(){
      const url = SHEET_URL + (SHEET_URL.includes("?")?"&":"?") + "cb=" + Math.floor(Date.now()/60000);
      const resp = await fetch(url, {cache:"no-store"});
      if(!resp.ok) throw new Error("HTTP "+resp.status);
      const text = await resp.text();
      const lines = text.split("\n").map(l=>l.trim()).filter(Boolean);
      const headers = parseLine(lines[0]).map(h=>h.toLowerCase());
      const ix = (name)=>headers.indexOf(name);
      const iDay=ix("day"), iPath=ix("landing_page_path"), iSess=ix("sessions"),
            iOrders=ix("sessions_that_completed_checkout"), iCvr=ix("conversion_rate");

      const raw=[];
      for(let i=1;i<lines.length;i++){
        const c=parseLine(lines[i]);
        const day=(c[iDay]||"").trim();
        const path=(c[iPath]||"").trim();
        if(!path || day.toLowerCase()==="day") continue;
        if(!/^\d{4}-\d{2}-\d{2}$/.test(day)) continue;
        raw.push({day,path,sessions:num(c[iSess]),orders:num(c[iOrders])});
      }

      // Last 30 days anchored to the most recent date present in the data
      const maxDay = raw.reduce((m,r)=> r.day>m ? r.day : m, "0000-00-00");
      const end = new Date(maxDay+"T00:00:00");
      const startD = new Date(end); startD.setDate(startD.getDate()-(WINDOW_DAYS-1));
      const startStr = startD.toISOString().slice(0,10);

      const win = raw.filter(r=> r.day>=startStr && r.day<=maxDay);
      const dayCount = new Set(win.map(r=>r.day)).size;

      const map=new Map();
      for(const r of win){
        let a=map.get(r.path);
        if(!a){a={path:r.path,sessions:0,orders:0};map.set(r.path,a);}
        a.sessions+=r.sessions; a.orders+=r.orders;
      }
      const div = dayCount || 1;
      const pages=[...map.values()].map(a=>({
        path:a.path,
        url:BASE_URL+normPath(a.path),
        sessions:a.sessions, orders:a.orders,
        avgSessions:a.sessions/div, avgOrders:a.orders/div,
        cvr:a.sessions>0 ? a.orders/a.sessions : 0,
      }));

      state={pages, dayCount, start:startStr, end:maxDay};
      render();
    }

    function render(){
      const sortBy=document.getElementById("sortBy").value;
      const topN=parseInt(document.getElementById("topN").value,10);
      const key=sortBy==="orders"?"avgOrders":sortBy==="cvr"?"cvr":"avgSessions";
      const sorted=[...state.pages].sort((a,b)=>b[key]-a[key]);
      const shown=sorted.slice(0,topN);

      document.getElementById("subtitle").textContent =
        `Avg per day · ${state.start} → ${state.end} (${state.dayCount} days) · ${state.pages.length} pages`;

      const totSessions=state.pages.reduce((s,p)=>s+p.sessions,0);
      const totOrders=state.pages.reduce((s,p)=>s+p.orders,0);
      document.getElementById("totals").innerHTML = `
        <div class="stat"><div class="v">${fmt1(totSessions/(state.dayCount||1))}</div><div class="l">Avg sessions / day</div></div>
        <div class="stat"><div class="v">${fmt1(totOrders/(state.dayCount||1))}</div><div class="l">Avg orders / day</div></div>
        <div class="stat"><div class="v">${pct(totSessions>0?totOrders/totSessions:0)}</div><div class="l">Overall CVR</div></div>
        <div class="stat"><div class="v">${fmt(totSessions)}</div><div class="l">Total sessions (30d)</div></div>
      `;

      const list=document.getElementById("list");
      if(!shown.length){ list.innerHTML='<li class="state">No data in the last 30 days.</li>'; return; }
      list.innerHTML = shown.map((p,i)=>`
        <a class="row" href="${p.url}" target="_blank" rel="noopener">
          <div class="rank">${i+1}</div>
          <div class="pmeta">
            <div class="pname">${escapeHtml(p.path==="/"?"Home (/)":p.path)}</div>
            <div class="ppath">${fmt(p.sessions)} sessions · ${fmt(p.orders)} orders · ${pct(p.cvr)} CVR (30d total)</div>
          </div>
          <div class="metrics">
            <div class="metric"><div class="mv">${fmt1(p.avgSessions)}</div><div class="ml">Sess/day</div></div>
            <div class="metric"><div class="mv orders">${fmt1(p.avgOrders)}</div><div class="ml">Orders/day</div></div>
          </div>
        </a>
      `).join("");
    }

    function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

    document.getElementById("sortBy").addEventListener("change",render);
    document.getElementById("topN").addEventListener("change",render);

    load().catch(err=>{
      document.getElementById("list").innerHTML=`<li class="state">Failed to load data: ${escapeHtml(err.message)}</li>`;
    });
  </script>
</body>
</html>
